function hideLoading(){document.getElementById('loading').classList.remove('show')}
(function(){var wrap=document.getElementById('joy-wrap'),thumb=document.getElementById('joy-thumb');var R=50,dead=12;var active=false,keys={};function getC(){var r=wrap.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2}}function sk(k,v){if(v&&!keys[k]){document.dispatchEvent(new KeyboardEvent('keydown',{key:k,bubbles:true}));keys[k]=true}else if(!v&&keys[k]){document.dispatchEvent(new KeyboardEvent('keyup',{key:k,bubbles:true}));keys[k]=false}}function move(px,py){var c=getC();var dx=px-c.x,dy=py-c.y;var dist=Math.sqrt(dx*dx+dy*dy),cl=Math.min(dist,R),a=Math.atan2(dy,dx);thumb.style.transform='translate(calc(-50% + '+Math.cos(a)*cl+'px),calc(-50% + '+Math.sin(a)*cl+'px))';if(dist>dead){sk('ArrowUp',dy<-dead&&Math.abs(dy)>Math.abs(dx)*.5);sk('ArrowDown',dy>dead&&Math.abs(dy)>Math.abs(dx)*.5);sk('ArrowLeft',dx<-dead&&Math.abs(dx)>Math.abs(dy)*.5);sk('ArrowRight',dx>dead&&Math.abs(dx)>Math.abs(dy)*.5)}else{['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].forEach(function(k){sk(k,false)})}}function release(){active=false;thumb.style.transform='translate(-50%,-50%)';thumb.classList.remove('active');['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].forEach(function(k){sk(k,false)})}wrap.addEventListener('touchstart',function(e){e.preventDefault();active=true;thumb.classList.add('active');move(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});wrap.addEventListener('touchmove',function(e){e.preventDefault();if(active)move(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});wrap.addEventListener('touchend',function(e){e.preventDefault();release()},{passive:false});wrap.addEventListener('mousedown',function(e){active=true;thumb.classList.add('active');move(e.clientX,e.clientY)});document.addEventListener('mousemove',function(e){if(active)move(e.clientX,e.clientY)});document.addEventListener('mouseup',function(){if(active)release()})})();
(function(){var map={'btn-a':{key:'x'},'btn-b':{key:'z'},'btn-start':{key:'Enter'},'btn-select':{key:'Shift'}};Object.keys(map).forEach(function(id){var key=map[id].key;var el=document.getElementById(id);if(!el)return;var p=function(){document.dispatchEvent(new KeyboardEvent('keydown',{key:key,bubbles:true}))};var r=function(){document.dispatchEvent(new KeyboardEvent('keyup',{key:key,bubbles:true}))};el.addEventListener('touchstart',function(e){e.preventDefault();p()},{passive:false});el.addEventListener('touchend',function(e){e.preventDefault();r()},{passive:false});el.addEventListener('mousedown',p);el.addEventListener('mouseup',r)})})();
</script></body></html>
