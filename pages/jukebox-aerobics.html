:root{--bg:#04040c;--surf:#0a0a18;--panel:#12121e;--bord:#1e1e38;--gold:#ffd700;--text:#dde0ff;--dim:#44446a;--acc:#cc44ff;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;overflow-x:hidden;user-select:none;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);pointer-events:none;z-index:9999}
#ham{width:36px;height:36px;background:var(--panel);border:1px solid var(--bord);border-radius:6px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;cursor:pointer;}
#ham span{display:block;width:18px;height:2px;background:var(--gold);border-radius:2px}
#sidenav{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--surf);border-right:1px solid var(--bord);z-index:300;transform:translateX(-100%);transition:transform .25s;display:flex;flex-direction:column;padding:16px 0;overflow-y:auto;}
#sidenav.open{transform:translateX(0)}
#sidenav h3{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--gold);padding:8px 16px 14px;border-bottom:1px solid var(--bord);margin-bottom:6px;}
#sidenav a{display:flex;align-items:center;gap:10px;padding:10px 16px;color:var(--dim);text-decoration:none;font-size:14px;font-weight:700;}
#sidenav a:active,#sidenav a.active{color:var(--gold);background:rgba(255,215,0,.06);padding-left:20px;border-left:3px solid var(--gold);}
#nav-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:299;display:none}
#nav-ov.show{display:block}
#topbar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surf);border-bottom:3px solid;border-image:linear-gradient(90deg,var(--acc),var(--gold),var(--acc)) 1;position:sticky;top:0;z-index:100;}
.logo-badge{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 40% 35%,var(--acc),#440066);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(204,68,255,.3)}50%{box-shadow:0 0 20px rgba(204,68,255,.6)}}
.t1{font-family:'Press Start 2P',monospace;font-size:7px;background:linear-gradient(90deg,var(--gold),#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.t2{font-size:10px;color:var(--dim);letter-spacing:2px}
#main{max-width:700px;margin:0 auto;padding:12px 10px 80px;}
#now-playing{background:var(--surf);border:1px solid var(--bord);border-radius:14px;padding:14px;margin-bottom:12px;position:relative;overflow:hidden;}
#now-playing::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(204,68,255,.06),transparent 70%);pointer-events:none;}
.np-inner{display:flex;gap:12px;align-items:center}
#album-art{width:64px;height:64px;border-radius:10px;flex-shrink:0;background:var(--panel);border:2px solid var(--bord);display:flex;align-items:center;justify-content:center;font-size:1.8rem;}
#album-art.spinning{animation:spin 3s linear infinite}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.np-text{flex:1;min-width:0}
.np-label{font-family:'Press Start 2P',monospace;font-size:5px;color:var(--dim);letter-spacing:1px;margin-bottom:4px}
#np-title{font-size:16px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#np-artist{font-size:13px;color:var(--dim);margin-top:2px}
#np-time{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--gold);margin-top:6px}
#prog-track{width:100%;height:4px;background:var(--panel);border-radius:2px;margin-top:8px;cursor:pointer;}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--gold));border-radius:2px;width:0%;}
#viz-canvas{width:100%;height:50px;display:block;background:var(--panel);border-radius:8px;margin-bottom:12px;}
#controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.ctrl-btn{width:44px;height:44px;border-radius:50%;background:var(--panel);border:1px solid var(--bord);color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ctrl-btn:active{border-color:var(--gold);color:var(--gold)}
.ctrl-btn.primary{width:56px;height:56px;font-size:1.4rem;background:radial-gradient(circle at 40% 35%,var(--acc),#440066);border:2px solid var(--gold);color:#fff;}
.ctrl-btn.active{color:var(--gold);border-color:var(--gold)}
.vol-row{display:flex;align-items:center;gap:6px}
#vol-slider{-webkit-appearance:none;width:90px;height:4px;background:var(--panel);border-radius:2px;outline:none;cursor:pointer;}
#vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold);}
.tabs{display:flex;gap:6px;margin-bottom:8px}
.tab-btn{flex:1;padding:8px;background:var(--panel);border:1px solid var(--bord);border-radius:8px;color:var(--dim);font-size:13px;font-weight:700;cursor:pointer;text-align:center;}
.tab-btn.active{background:rgba(255,215,0,.1);border-color:var(--gold);color:var(--gold)}
#track-list{background:var(--surf);border:1px solid var(--bord);border-radius:10px;max-height:320px;overflow-y:auto;margin-bottom:12px;}
.track-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--bord);cursor:pointer;}
.track-item:last-child{border-bottom:none}
.track-item:active{background:rgba(255,255,255,.03)}
.track-item.playing{background:rgba(255,215,0,.06);border-left:3px solid var(--gold);}
.track-item.playing .track-name{color:var(--gold)}
.track-num{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--dim);width:20px;flex-shrink:0;text-align:right}
.track-info{flex:1;min-width:0}
.track-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-artist{font-size:11px;color:var(--dim);margin-top:1px}
.track-dur{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--dim);flex-shrink:0}
#search-section{background:var(--surf);border:1px solid var(--bord);border-radius:10px;padding:12px;}
.search-label{font-family:'Press Start 2P',monospace;font-size:5px;color:var(--dim);letter-spacing:1px;margin-bottom:8px}
.search-row{display:flex;gap:6px}
#search-input{flex:1;padding:8px 12px;background:var(--bg);border:1px solid var(--bord);border-radius:6px;color:var(--text);font-size:14px;}
#search-btn{padding:8px 14px;background:var(--gold);border:none;border-radius:6px;color:#000;font-weight:700;font-size:13px;cursor:pointer;}
#search-results{margin-top:8px}
.search-result{padding:8px 10px;border-bottom:1px solid var(--bord);font-size:13px;cursor:pointer;}
.search-result:active{color:var(--gold)}
#yt-wrap{position:fixed;bottom:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;pointer-events:none}
#notif{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--panel);border:1px solid var(--gold);border-radius:10px;padding:8px 16px;z-index:800;transition:transform .3s;font-family:'Press Start 2P',monospace;font-size:6px;color:var(--gold);text-align:center;line-height:1.8;max-width:90vw;}
#notif.show{transform:translateX(-50%) translateY(0)}
</style>

var player=null,ytReady=false,curIdx=0,playing=false,shuffled=false,slist=[...PL],tab='mario',pi=null;
window.onYouTubeIframeAPIReady=function(){ytReady=true;player=new YT.Player('yt-player',{height:'1',width:'1',playerVars:{autoplay:0,controls:0,disablekb:1,enablejsapi:1,fs:0,iv_load_policy:3,modestbranding:1,playsinline:1,rel:0},events:{onStateChange:onSt,onError:function(){setTimeout(nx,800)}}});notif('🎵 Jukebox ready!');};
function onSt(e){var S=YT.PlayerState;if(e.data===S.PLAYING){playing=true;document.getElementById('btn-play').textContent='⏸';document.getElementById('album-art').classList.add('spinning');startPi();}else if(e.data===S.PAUSED){playing=false;document.getElementById('btn-play').textContent='▶';document.getElementById('album-art').classList.remove('spinning');}else if(e.data===S.ENDED){nx();}}
function gl(){return shuffled?slist:PL;}
function ct(){return gl()[curIdx]||null;}
function load(i,auto){var l=gl();if(i<0||i>=l.length)return;curIdx=i;var t=l[i];upNP(t);hilite(t.id);if(auto&&ytReady&&player){player.loadVideoById(t.yt);playing=true;}else if(ytReady&&player)player.cueVideoById(t.yt);}
function togglePlay(){if(!ytReady){notif('Loading...');return;}if(!ct()){load(0,true);return;}if(playing){player.pauseVideo();}else{var s=player.getPlayerState();(s===-1||s===5)?player.loadVideoById(ct().yt):player.playVideo();playing=true;}}
function nx(){var l=gl();load((curIdx+1)%l.length,playing);}
function prevTrack(){var l=gl();load((curIdx-1+l.length)%l.length,playing);}
function nextTrack(){nx();}
function toggleShuffle(){shuffled=!shuffled;if(shuffled){slist=[...PL].sort(function(){return Math.random()-.5;});curIdx=0;}document.getElementById('btn-shuffle').classList.toggle('active',shuffled);notif(shuffled?'SHUFFLE ON':'SHUFFLE OFF');}
function setVol(v){if(ytReady&&player&&player.setVolume)player.setVolume(parseInt(v));}
function startPi(){if(pi)clearInterval(pi);pi=setInterval(function(){if(!ytReady||!player||!player.getDuration)return;var c=player.getCurrentTime()||0,d=player.getDuration()||0;if(d>0){document.getElementById('prog-fill').style.width=(c/d*100)+'%';document.getElementById('np-time').textContent=ft(c)+' / '+ft(d);}},500);}
function ft(s){if(!s||isNaN(s))return'0:00';return Math.floor(s/60)+':'+(Math.floor(s%60)<10?'0':'')+Math.floor(s%60);}
function seekClick(e){if(!ytReady||!player||!player.getDuration)return;var r=e.currentTarget.getBoundingClientRect();var d=player.getDuration();if(d>0)player.seekTo(((e.clientX-r.left)/r.width)*d,true);}
function upNP(t){if(!t)return;document.getElementById('np-title').textContent=t.title;document.getElementById('np-artist').textContent=t.artist;document.getElementById('album-art').textContent=t.type==='mario'?'🍄':'🎸';document.getElementById('np-time').textContent='0:00 / '+t.dur;document.getElementById('prog-fill').style.width='0%';}
function hilite(id){document.querySelectorAll('.track-item').forEach(function(e){e.classList.remove('playing');});var el=document.querySelector('.track-item[data-id="'+id+'"]');if(el){el.classList.add('playing');el.scrollIntoView({block:'nearest',behavior:'smooth'});}}
function renderList(type){var c=document.getElementById('track-list');c.innerHTML=PL.filter(function(t){return t.type===type;}).map(function(t,i){var gi=PL.indexOf(t);return'<div class="track-item" data-id="'+t.id+'" onclick="load('+gi+',true)">'+'<span class="track-num">'+(i+1)+'</span>'+'<div class="track-info"><div class="track-name">'+t.title+'</div><div class="track-artist">'+t.artist+'</div></div>'+'<span class="track-dur">'+t.dur+'</span></div>';}).join('');}
function switchTab(type){tab=type;document.getElementById('tab-mario').classList.toggle('active',type==='mario');document.getElementById('tab-rock').classList.toggle('active',type==='rock');renderList(type);var t=ct();if(t)hilite(t.id);}
function doSearch(){var q=document.getElementById('search-input').value.trim().toLowerCase();if(!q)return;var c=document.getElementById('search-results');var f=PL.filter(function(t){return t.title.toLowerCase().indexOf(q)>=0||t.artist.toLowerCase().indexOf(q)>=0;});if(f.length){c.innerHTML=f.slice(0,8).map(function(t){var gi=PL.indexOf(t);return'<div class="search-result" onclick="load('+gi+',true);switchTab(\''+t.type+'\')">'+(t.type==='mario'?'🍄':'🎸')+' '+t.title+' — '+t.artist+'</div>';}).join('');notif('Found '+f.length+' tracks');}else{c.innerHTML='<div style="padding:10px"><div style="font-size:12px;color:var(--dim)">Not found.</div><a href="https://www.youtube.com/results?search_query='+encodeURIComponent(q)+'" target="_blank" style="color:#00ffcc;font-size:13px">Search YouTube for "'+q+'" →</a></div>';}}
var vb=Array.from({length:32},function(){return{h:Math.random()*.3,v:Math.random()*.05+.01};});
function dv(){requestAnimationFrame(dv);var c=document.getElementById('viz-canvas'),x=c.getContext('2d');c.width=c.offsetWidth||640;c.height=50;x.clearRect(0,0,c.width,50);var bw=(c.width/32)-2;vb.forEach(function(b,i){if(playing){b.h+=b.v*(Math.random()>.5?1:-1);b.h=Math.max(.04,Math.min(1,b.h));}else b.h=Math.max(.04,b.h*.95);var bh=b.h*50,gx=x.createLinearGradient(0,50-bh,0,50);gx.addColorStop(0,'#cc44ff');gx.addColorStop(.4,'#ffd700');gx.addColorStop(1,'#664400');x.fillStyle=gx;x.fillRect(i*(bw+2),50-bh,bw,bh);});}
dv();
function toggleNav(){document.getElementById('sidenav').classList.toggle('open');document.getElementById('nav-ov').classList.toggle('show');}
function closeNav(){document.getElementById('sidenav').classList.remove('open');document.getElementById('nav-ov').classList.remove('show');}
var nt=null;
function notif(m){var e=document.getElementById('notif');e.innerHTML=m;e.classList.add('show');if(nt)clearTimeout(nt);nt=setTimeout(function(){e.classList.remove('show');},2200);}
renderList('mario');upNP(PL[0]);
