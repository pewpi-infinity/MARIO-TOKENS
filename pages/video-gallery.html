<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Video Gallery — MARIO TOKENS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;color:#eee;font-family:'Courier New',monospace;}
header{background:#111;border-bottom:2px solid #f7c948;padding:.7rem 1rem;display:flex;align-items:center;gap:.75rem;}
.brand{font-size:.9rem;font-weight:700;color:#f7c948;text-transform:uppercase;letter-spacing:1px;}
.sub{font-size:.65rem;color:#888;text-transform:uppercase;letter-spacing:1px;}
.player-wrap{background:#000;position:relative;aspect-ratio:16/9;width:100%;}
.player-wrap iframe{width:100%;height:100%;border:none;display:block;}
.now{padding:.5rem 1rem;font-size:.75rem;color:#f7c948;background:#111;border-bottom:1px solid #222;}
.tabs{display:flex;gap:.5rem;padding:.75rem 1rem;overflow-x:auto;background:#0d0d17;border-bottom:1px solid #1a1a2e;}
.tab{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:20px;padding:.3rem .85rem;font-size:.72rem;cursor:pointer;color:#888;white-space:nowrap;font-family:'Courier New',monospace;}
.tab.active{border-color:#f7c948;color:#f7c948;background:#1a1500;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;padding:.75rem 1rem;}
.vcard{background:#111;border:1px solid #1a1a2e;border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .2s;}
.vcard:hover,.vcard.active{border-color:#f7c948;}
.vcard img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#1a1a1a;}
.vcard-body{padding:.45rem .55rem;}
.vtitle{font-size:.7rem;font-weight:700;color:#eee;line-height:1.3;margin-bottom:.2rem;}
.vcat{font-size:.62rem;color:#888;text-transform:uppercase;}
.vcard.active .vtitle{color:#f7c948;}
</style>
</head>
<body>
<header>
  <div>
    <div class="brand">📺 Video Gallery</div>
    <div class="sub">Mario Cartoons · Game Music · Retro TV</div>
  </div>
</header>
<div class="player-wrap">
  <iframe id="player" src="https://archive.org/embed/super-mario-bros-super-show-ep-1" allowfullscreen allow="autoplay"></iframe>
</div>
<div class="now" id="now-playing">▶ NOW PLAYING: Super Mario Bros Super Show — Ep 1</div>
<div class="tabs" id="tabs">
  <button class="tab active" data-cat="all">All</button>
  <button class="tab" data-cat="Mario Cartoon">Cartoons</button>
  <button class="tab" data-cat="Game Music">Game Music</button>
  <button class="tab" data-cat="Retro TV">Retro TV</button>
</div>
<div class="grid" id="grid"></div>
<script>
const VIDS=[
  {id:'super-mario-bros-super-show-ep-1',cat:'Mario Cartoon',title:'Super Mario Bros Super Show Ep 1',thumb:'https://archive.org/services/img/super-mario-bros-super-show-ep-1'},
  {id:'super-mario-bros-super-show-ep-2',cat:'Mario Cartoon',title:'Super Mario Bros Super Show Ep 2',thumb:'https://archive.org/services/img/super-mario-bros-super-show-ep-2'},
  {id:'super-mario-bros-3-cartoon-ep1',cat:'Mario Cartoon',title:'Adventures of Mario Bros 3 — Ep 1',thumb:'https://archive.org/services/img/super-mario-bros-3-cartoon-ep1'},
  {id:'SuperMarioWorldCartoon',cat:'Mario Cartoon',title:'Super Mario World Cartoon Ep 1',thumb:'https://archive.org/services/img/SuperMarioWorldCartoon'},
  {id:'TheLegendOfZeldaCartoon',cat:'Mario Cartoon',title:'Legend of Zelda Cartoon Ep 1',thumb:'https://archive.org/services/img/TheLegendOfZeldaCartoon'},
  {id:'super-mario-bros-all-music',cat:'Game Music',title:'SMB All Music — Full Soundtrack',thumb:'https://archive.org/services/img/super-mario-bros-all-music'},
  {id:'mario-galaxy-music',cat:'Game Music',title:'Mario Galaxy — Best Music',thumb:'https://archive.org/services/img/mario-galaxy-music'},
  {id:'smb3-world-map-theme',cat:'Game Music',title:'SMB3 World Map Theme',thumb:'https://archive.org/services/img/smb3-world-map-theme'},
  {id:'super-mario-world-overworld',cat:'Game Music',title:'Super Mario World Overworld',thumb:'https://archive.org/services/img/super-mario-world-overworld'},
  {id:'smb-underwater-theme',cat:'Game Music',title:'SMB Underwater Theme',thumb:'https://archive.org/services/img/smb-underwater-theme'},
  {id:'smb3-athletic-theme',cat:'Game Music',title:'SMB3 Athletic Theme',thumb:'https://archive.org/services/img/smb3-athletic-theme'},
  {id:'mario-kart-64-music',cat:'Game Music',title:'Mario Kart 64 — All Tracks',thumb:'https://archive.org/services/img/mario-kart-64-music'},
  {id:'starman-invincibility',cat:'Game Music',title:'Starman / Invincibility Theme',thumb:'https://archive.org/services/img/starman-invincibility'},
  {id:'smb-underground-theme',cat:'Game Music',title:'SMB Underground Theme',thumb:'https://archive.org/services/img/smb-underground-theme'},
];
const FB='https://archive.org/images/notfound.png';
let cur=0,filtered=[...VIDS];
function render(arr){
  document.getElementById('grid').innerHTML=arr.map((v,i)=>`
    <div class="vcard${i===0?' active':''}" onclick="play(${VIDS.indexOf(v)},this)">
      <img src="${v.thumb}" loading="lazy" onerror="this.src='${FB}'">
      <div class="vcard-body"><div class="vtitle">${v.title}</div><div class="vcat">${v.cat}</div></div>
    </div>`).join('');
}
function play(i,el){
  cur=i;
  document.getElementById('player').src='https://archive.org/embed/'+VIDS[i].id+'?autoplay=1';
  document.getElementById('now-playing').textContent='▶ NOW PLAYING: '+VIDS[i].title;
  document.querySelectorAll('.vcard').forEach(c=>c.classList.remove('active'));
  if(el)el.classList.add('active');
}
document.getElementById('tabs').addEventListener('click',e=>{
  const t=e.target.closest('.tab');if(!t)return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  const c=t.dataset.cat;
  filtered=c==='all'?[...VIDS]:VIDS.filter(v=>v.cat===c);
  render(filtered);
});
render(filtered);
</script>
</body>
</html>
