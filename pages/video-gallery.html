<link rel="stylesheet" href="../css/infinity-theme.css"/>
<link rel="stylesheet" href="../css/fixes.css"/>
<style>
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;width:100%}
.vcard{background:var(--bg-card,#0d0d1f);border:2px solid rgba(255,204,0,.2);border-radius:10px;overflow:hidden;transition:border-color .2s}
.vcard.playing{border-color:var(--gold,#ffcc00);box-shadow:0 0 20px rgba(255,204,0,.3)}
.vthumb{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#0a0a1a,#1a1a3e);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.vthumb:active{opacity:.8}
.play-btn{width:56px;height:56px;border-radius:50%;background:var(--gold,#ffcc00);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#000;box-shadow:0 0 20px rgba(255,204,0,.5)}
.vlabel{font-size:.65rem;color:var(--text-dim,#888);letter-spacing:2px}
.vembed{width:100%;aspect-ratio:16/9;display:none}
.vembed iframe{width:100%;height:100%;border:none;display:block}
.vinfo{padding:10px 14px}
.vtitle{font-size:.85rem;color:var(--gold,#ffcc00);font-weight:bold;margin-bottom:4px}
.vmeta{font-size:.65rem;color:var(--text-dim,#888);display:flex;gap:10px}
.vfact{background:rgba(255,204,0,.08);border-left:3px solid var(--gold,#ffcc00);padding:8px 12px;margin:0 14px 12px;border-radius:0 6px 6px 0;font-size:.7rem;color:var(--text,#e0e0e0);display:none;line-height:1.5}
.vfact.show{display:block}
</style>
</head>

  <h1>&#x1F4FA; Video Gallery</h1>
  <p class="tagline">Synch Pipe Arcade &#9679; Mario Cartoons &amp; Classic Gaming</p>

</section>

<script src="../js/navigation.js"></script>
<script>
var VIDEOS=[
  {id:'ep1',icon:'🍄',title:'Super Mario Super Show — Ep.1',year:'1989',type:'Cartoon · DiC',
   embed:'https://archive.org/embed/the-super-mario-bros.-super-show-01x-01-the-bird-the-bird-naughty-word',
   fact:'Lou Albano played Mario in live-action segments. Each episode ends with Do the Mario!'},
  {id:'ep2',icon:'🍄',title:'Super Mario Super Show — Ep.2',year:'1989',type:'Cartoon · DiC',
   embed:'https://archive.org/embed/the-super-mario-bros.-super-show-01x-02-king-mario-of-cramalot-george-washington-slept-here',
   fact:'The show ran 65 episodes and also included Legend of Zelda cartoon segments.'},
  {id:'ep21',icon:'🍄',title:'Super Mario Super Show — Baby Mario Love',year:'1989',type:'Cartoon · DiC',
   embed:'https://archive.org/embed/the-super-mario-bros.-super-show-01x-21-baby-mario-love-koopenstein',
   fact:'Danny Wells played Luigi. Princess Peach was called Princess Toadstool in the series.'},
  {id:'smb',icon:'🕹️',title:'Super Mario Bros. — NES',year:'1985',type:'NES Gameplay',
   embed:'https://archive.org/embed/super-mario-bros-nes',
   fact:'Super Mario Bros. sold 40M+ copies. World 1-1 is the most recognised level in gaming.'},
  {id:'smb3',icon:'🦅',title:'Super Mario Bros. 3 — NES',year:'1990',type:'NES Gameplay',
   embed:'https://archive.org/embed/super-mario-bros-3-nes',
   fact:'SMB3 was first revealed to the public in the 1989 film The Wizard.'},
  {id:'zelda',icon:'🗡️',title:'Legend of Zelda — NES',year:'1986',type:'NES Gameplay',
   embed:'https://archive.org/embed/the-legend-of-zelda-nes',
   fact:'Zelda was one of the first cartridge games with a battery save feature.'},
  {id:'contra',icon:'🔫',title:'Contra — NES',year:'1987',type:'NES Gameplay',
   embed:'https://archive.org/embed/contra-nes',
   fact:'Up Up Down Down Left Right Left Right B A — the Konami Code gives 30 lives.'},
  {id:'sonic',icon:'🦔',title:'Sonic the Hedgehog — Genesis',year:'1991',type:'Genesis Gameplay',
   embed:'https://archive.org/embed/sonic-the-hedgehog-genesis',
   fact:'Sonic was made to rival Mario. Green Hill Zone is one of gaming\'s most iconic levels.'}
];
function playVideo(id){
  var v=VIDEOS.find(function(x){return x.id===id;});
  if(!v)return;
  var card=document.getElementById('vc-'+id);
  card.querySelector('.vthumb').style.display='none';
  var em=card.querySelector('.vembed');
  em.style.display='block';
  em.innerHTML='<iframe src="'+v.embed+'?autoplay=1" allowfullscreen allow="autoplay;fullscreen;gamepad *;pointer-lock" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-pointer-lock" title="'+v.title+'" loading="eager"></iframe>';
  card.classList.add('playing');
  card.querySelector('.vfact').classList.add('show');
  if(navigator.vibrate)navigator.vibrate(15);
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
}
(function(){
  var g=document.getElementById('vgrid');
  VIDEOS.forEach(function(v){
    var d=document.createElement('div');
    d.className='vcard';d.id='vc-'+v.id;
    d.innerHTML='<div class="vthumb" onclick="playVideo(\''+v.id+'\')" role="button"><div class="play-btn">&#9654;</div><div class="vlabel">'+v.icon+' TAP TO PLAY</div></div>'+
      '<div class="vembed"></div>'+
      '<div class="vinfo"><div class="vtitle">'+v.icon+' '+v.title+'</div><div class="vmeta"><span>&#x1F4C5; '+v.year+'</span><span>'+v.type+'</span></div></div>'+
      '<div class="vfact">&#x1F4A1; '+v.fact+'</div>';
    g.appendChild(d);
  });
})();
</script>
</body>
